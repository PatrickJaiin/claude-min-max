name: Morning Claude Ping

# Pings Claude on a schedule so your Pro/Max subscription's rolling 5-hour
# usage window starts at a time *you* choose (e.g. 9:30am) instead of whenever
# you happen to send your first message of the day.
#
# This runs on GitHub's servers, so it fires even when your laptop is closed
# or off. It uses Claude Code in headless mode authenticated with your
# subscription token, so the ping counts against your real account window
# (the API would NOT — it has no 5-hour window).

on:
  schedule:
    # UTC firing times computed from your timezone and ping time(s) by
    # install.sh (re-run it to change them). Three firings per ping time, all
    # at "unpopular" odd minutes — round-hour crons (0 4 * * *) are stampeded
    # on GitHub and can queue for hours. The first fires ~7 min BEFORE your
    # target so the ping lands by your chosen time; the others are retries.
    # The gate step ensures at most one firing actually pings.
    # CRON-BEGIN (auto-generated by install.sh)
    - cron: "53 3 * * *"   # 09:30 Asia/Kolkata (fires ~09:23 local)
    - cron: "13 4 * * *"   # retry
    - cron: "47 4 * * *"   # retry
    # CRON-END
  workflow_dispatch: {} # adds a manual "Run workflow" button for testing

permissions:
  contents: read
  actions: write # read run history for dedupe; delete old no-op retry runs

concurrency:
  group: morning-claude-ping
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Gate (late guard + dedupe retries)
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
          PING_UTC_MINS: ${{ vars.PING_UTC_MINS }}
        run: |
          set -euo pipefail
          # Manual runs always ping. Scheduled runs ping only if BOTH hold:
          #  1) Late guard — we're within [-15, +90] minutes of a ping target
          #     (GitHub sometimes delays crons by hours; a ping that late would
          #     start a useless mid-day window, so skipping beats pinging).
          #  2) Dedupe — no sibling scheduled run succeeded in the last 70 min
          #     (the extra firings are retries, not extra pings).
          go=true
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # PING_UTC_MINS: target time(s) as minutes after UTC midnight,
            # comma-separated (set by install.sh). Absent → guard disabled.
            if [ -n "${PING_UTC_MINS:-}" ]; then
              now=$(( 10#$(date -u +%H) * 60 + 10#$(date -u +%M) ))
              best=99999; sd=0
              IFS=',' read -ra tt <<< "$PING_UTC_MINS"
              for t in "${tt[@]}"; do
                t=$(printf '%s' "$t" | tr -cd '0-9'); [ -n "$t" ] || continue
                d=$(( (now - 10#$t + 1440) % 1440 ))     # minutes since target
                [ "$d" -gt 720 ] && d=$(( d - 1440 ))    # signed (early < 0)
                ad=${d#-}
                if [ "$ad" -lt "$best" ]; then best=$ad; sd=$d; fi
              done
              if [ "$best" -eq 99999 ] || [ "$sd" -lt -15 ] || [ "$sd" -gt 90 ]; then
                echo "Too far from a ping target (delta ${sd} min) — skipping."
                go=false
              fi
            fi
            if [ "$go" = "true" ]; then
              recent=$(gh api "repos/$GITHUB_REPOSITORY/actions/workflows/ping.yml/runs?status=success&event=schedule&per_page=10" \
                --jq "[.workflow_runs[] | select(.id != ${{ github.run_id }})
                       | select((now - (.run_started_at | fromdateiso8601)) < 4200)] | length")
              if [ "$recent" -gt 0 ]; then
                echo "A sibling run already pinged in the last 70 min — skipping."
                go=false
              fi
            fi
          fi
          echo "go=$go" >> "$GITHUB_OUTPUT"

      - name: Install Claude Code
        if: steps.gate.outputs.go == 'true'
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Ping Claude (starts your 5-hour window)
        if: steps.gate.outputs.go == 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          PING_PROMPT: "${{ vars.PING_PROMPT || 'Reply with only the single word ready' }}"
          PING_MODEL: "${{ vars.PING_MODEL || 'haiku' }}"
        run: |
          set -euo pipefail
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN:-}" ]; then
            echo "::error::Missing CLAUDE_CODE_OAUTH_TOKEN secret. Run 'claude setup-token' locally, then add it under Settings → Secrets and variables → Actions → New repository secret."
            exit 1
          fi
          echo "Pinging Claude (model: $PING_MODEL)…"
          claude -p "$PING_PROMPT" --model "$PING_MODEL" --max-turns 1
          echo "✓ Done — your 5-hour window has started."

      - name: Tidy up old no-op runs
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          # Keep the Actions tab meaningful: delete successful runs older than
          # 25 min whose ping step was skipped (gate no-ops). Real pings and
          # failures stay visible.
          gh api "repos/$GITHUB_REPOSITORY/actions/workflows/ping.yml/runs?status=success&per_page=50" \
            --jq '.workflow_runs[] | select((now - (.run_started_at | fromdateiso8601)) > 1500) | .id' |
          while read -r rid; do
            skipped=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$rid/jobs" \
              --jq '[.jobs[].steps[] | select(.name | startswith("Ping Claude")) | select(.conclusion == "skipped")] | length' 2>/dev/null || echo 0)
            if [ "${skipped:-0}" -gt 0 ]; then
              gh api -X DELETE "repos/$GITHUB_REPOSITORY/actions/runs/$rid" >/dev/null 2>&1 \
                && echo "deleted no-op run $rid" || true
            fi
          done
          exit 0
